services:
  db:
    image: postgres:18
    container_name: trce_db
    restart: always
    shm_size: 128mb
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: trce
      POSTGRES_USER: trce
      POSTGRES_PASSWORD: trce
    volumes:
      - db-data:/var/lib/postgresql

  whodb:
    image: clidey/whodb
    container_name: trce_whodb
    restart: always
    ports:
      - 8080:8080

  mailpit:
    image: axllent/mailpit
    container_name: trce_mailpit
    restart: unless-stopped
    ports:
      - 8025:8025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  db-data:
